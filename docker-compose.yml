# Vollständiger Observability-Stack: Kamailio + kamailio_exporter (BINRPC/ctl)
# + Prometheus + Loki + Alloy + Grafana + Load-Controller. Details/Quellen siehe README.md.

services:

  cert-init:
    build:
      context: ./cert-init
    container_name: cert_init
    volumes:
      - ./kamailio/tls:/certs-out
    restart: "no"

  kamailio:
    image: ghcr.io/kamailio/kamailio:5.8.8-bookworm
    platform: linux/amd64
    container_name: kamailio
    restart: unless-stopped
    environment:
      # steuert die -m / -M CLI-Flags im offiziellen Entrypoint
      SHM_MEMORY: "192"
      PKG_MEMORY: "16"
    volumes:
      - ./kamailio:/etc/kamailio:ro
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/tcp"
    depends_on:
      cert-init:
        condition: service_completed_successfully
    networks:
      - kamailio-net

  kamailio_exporter:
    build:
      context: https://github.com/florentchauveau/kamailio_exporter.git
    container_name: kamailio_exporter
    restart: unless-stopped
    command:
      - "--kamailio.scrape-uri=tcp://kamailio:2049"
      - "--kamailio.methods=tm.stats,sl.stats,core.shmmem,core.uptime,core.tcp_info"
    ports:
      - "9494:9494"
    depends_on:
      - kamailio
    networks:
      - kamailio-net

  loki:
    image: grafana/loki:2.5.0
    platform: linux/amd64
    container_name: loki
    user: root
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/local-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
      - /tmp:/wal
    ports:
      - "3100:3100"
    environment:
      - LOKI_RETENTION_DAYS=3
    networks:
      - kamailio-net

  alloy:
    image: grafana/alloy:latest
    platform: linux/amd64
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "12345:12345"
    depends_on:
      - loki
    networks:
      - kamailio-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - kamailio_exporter
    networks:
      - kamailio-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/datasources/loki.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - kamailio-net

  load-controller:
    build:
      context: ./load_controller
    container_name: load_controller
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - kamailio-certs:/etc/kamailio/tls:ro
    ports:
      - "8080:5000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      - kamailio
    networks:
      - kamailio-net

networks:
  kamailio-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  kamailio-certs: