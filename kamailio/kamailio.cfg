#!KAMAILIO
#
# Minimale Kamailio-Config fuer den Test-/Observability-Stack.
# Basiert strukturell auf dem offiziellen Default-Template
# (https://github.com/kamailio/kamailio/blob/master/etc/kamailio.cfg),
# reduziert auf: UDP/TCP/TLS SIP Registrar + Proxy, NAT-Detection, ctl/BINRPC.
# Kein DB-Backend, kein Presence/PSTN - bewusst minimal gehalten.

####### Global Parameters #########

debug=2
log_stderror=no
log_facility=LOG_LOCAL0

/* Anzahl der SIP-Worker-Prozesse je Socket */
children=4

/* SIP-Listener - Container-intern auf allen Interfaces */
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tls:0.0.0.0:5061

tcp_children=8
tcp_max_connections=4096

tcp_connection_lifetime=3605

enable_tls=yes
tls_max_connections=4096
tls_threads_mode=1

####### Modules Section ########

loadmodule "tls.so"
loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "textopsx.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "counters.so"
loadmodule "nathelper.so"

# ----------------- setting module-specific parameters ---------------

# ----- tls params -----
modparam("tls", "certificate", "/etc/kamailio/tls/kamailio-cert.pem")
modparam("tls", "private_key", "/etc/kamailio/tls/kamailio-key.pem")
modparam("tls", "ca_list", "/etc/kamailio/tls/ca-cert.pem")
modparam("tls", "verify_certificate", 0)

# ----- ctl params -----
# WICHTIG: TCP statt Unix-Socket, damit der kamailio_exporter-Container
# (eigener Netzwerk-Namespace) per BINRPC verbinden kann.
# Quelle Exporter-Doku: https://github.com/florentchauveau/kamailio_exporter
modparam("ctl", "binrpc", "tcp:0.0.0.0:2049")

# ----- jsonrpcs params -----
modparam("jsonrpcs", "pretty_format", 1)

# ----- registrar params -----
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)

# ----- usrloc params -----
modparam("usrloc", "timer_interval", 60)
modparam("usrloc", "nat_bflag", 6)

# ----- nathelper params -----
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "received_avp", "$avp(rcv)")

# ----- xlog params (Structured JSON Logging for Loki) -----
modparam("xlog", "force_color", 0)
modparam("xlog", "log_level", 2)

####### Routing Logic ########

request_route {
    xlog("L_INFO", "{\"timestamp\":\"$TS\",\"level\":\"INFO\",\"call_id\":\"$ci\",\"method\":\"$rm\",\"code\":0,\"from\":\"$fu\",\"to\":\"$tu\",\"ruri\":\"$ru\",\"route_header\":\"request\",\"via_branch\":\"$branch\",\"msg\":\"request_route entry\"}\n");
    route(REQINIT);
    route(NATDETECT);

    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # Retransmissions abfangen
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Requests innerhalb bestehender Dialoge
    route(WITHINDLG);

    ### nur initiale Requests (kein To-Tag) ab hier

    remove_hf("Route");
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    route(REGISTRAR);

    if ($rU==$null) {
        sl_send_reply("484", "Address Incomplete");
        exit;
    }

    route(LOCATION);
    return;
}

# Wrapper zum Weiterleiten von Requests
route[RELAY] {
    if (!t_relay()) {
        xlog("L_ERROR", "{\"timestamp\":\"$TS\",\"level\":\"ERROR\",\"call_id\":\"$ci\",\"method\":\"$rm\",\"code\":500,\"from\":\"$fu\",\"to\":\"$tu\",\"ruri\":\"$ru\",\"route_header\":\"relay_failed\",\"via_branch\":\"$branch\",\"msg\":\"t_relay() failed\"}\n");
        send_reply_error();
    }
    exit;
}

# Initiale Pruefungen je SIP-Request
route[REQINIT] {
    force_rport();

    if(is_method("OPTIONS") && uri==myself && $rU==$null) {
        sl_send_reply("200", "Keepalive");
        exit;
    }

    if ($msg(len) > 16384) {
        sl_send_reply("403", "Message too large");
        exit;
    }

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_ERROR", "{\"timestamp\":\"$TS\",\"level\":\"ERROR\",\"call_id\":\"$ci\",\"method\":\"$rm\",\"code\":400,\"from\":\"$fu\",\"to\":\"$tu\",\"ruri\":\"$ru\",\"route_header\":\"sanity_check_failed\",\"via_branch\":\"$branch\",\"msg\":\"Malformed SIP request from $si:$sp\"}\n");
        exit;
    }
}

# Requests innerhalb eines bestehenden Dialogs
route[WITHINDLG] {
    if (!has_totag()) return;

    if (loose_route()) {
        route(RELAY);
        exit;
    }

    if (is_method("ACK")) {
        if (t_check_trans()) {
            route(RELAY);
            exit;
        }
        exit;
    }

    sl_send_reply("404", "Not here");
    exit;
}

# SIP-Registrierungen
route[REGISTRAR] {
    if (!is_method("REGISTER")) return;

    if (!save("location")) {
        xlog("L_ERROR", "{\"timestamp\":\"$TS\",\"level\":\"ERROR\",\"call_id\":\"$ci\",\"method\":\"REGISTER\",\"code\":500,\"from\":\"$fu\",\"to\":\"$tu\",\"ruri\":\"$ru\",\"route_header\":\"registrar\",\"via_branch\":\"$branch\",\"msg\":\"save(location) failed\"}\n");
        send_reply_error();
    } else {
        xlog("L_INFO", "{\"timestamp\":\"$TS\",\"level\":\"INFO\",\"call_id\":\"$ci\",\"method\":\"REGISTER\",\"code\":200,\"from\":\"$fu\",\"to\":\"$tu\",\"ruri\":\"$ru\",\"route_header\":\"registrar\",\"via_branch\":\"$branch\",\"msg\":\"registration successful\"}\n");
    }
    exit;
}

# User-Location-Lookup fuer initiale Requests
route[LOCATION] {
    if (!lookup("location")) {
        $var(rc) = $rc;
        t_newtran();
        switch ($var(rc)) {
            case -1:
            case -3:
                xlog("L_INFO", "{\"timestamp\":\"$TS\",\"level\":\"INFO\",\"call_id\":\"$ci\",\"method\":\"$rm\",\"code\":404,\"from\":\"$fu\",\"to\":\"$tu\",\"ruri\":\"$ru\",\"route_header\":\"location_notfound\",\"via_branch\":\"$branch\",\"msg\":\"user not found in location table\"}\n");
                send_reply("404", "Not Found");
                exit;
            case -2:
                xlog("L_INFO", "{\"timestamp\":\"$TS\",\"level\":\"INFO\",\"call_id\":\"$ci\",\"method\":\"$rm\",\"code\":405,\"from\":\"$fu\",\"to\":\"$tu\",\"ruri\":\"$ru\",\"route_header\":\"location_method_not_allowed\",\"via_branch\":\"$branch\",\"msg\":\"method not allowed for user\"}\n");
                send_reply("405", "Method Not Allowed");
                exit;
        }
    }
    route(RELAY);
    exit;
}

# NAT-Erkennung auf Anrufer-Seite
route[NATDETECT] {
    if (nat_uac_test("19")) {
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else {
            if (is_first_hop()) {
                set_contact_alias();
            }
        }
    }
    return;
}
